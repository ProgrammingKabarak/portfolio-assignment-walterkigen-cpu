<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task List — vanilla JS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app">
    <h1>Task List</h1>

    <form id="task-form">
      <label for="task-input" class="visually-hidden">New task</label>
      <input type="text" id="task-input" placeholder="Add a task..." required minlength="2" autocomplete="off">
      <button type="submit">Add</button>
    </form>

    <div class="filters" role="group" aria-label="Filter tasks">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="active">Active</button>
      <button class="filter-btn" data-filter="completed">Completed</button>
    </div>

    <ul id="task-list" aria-live="polite"></ul>

    <p id="empty-state" class="empty-state">No tasks yet — add one above.</p>
    <p id="task-count" class="task-count"></p>
  </main>

  <script src="script.js"></script>
</body>
</html>
